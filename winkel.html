    <style>
        :root {
            --mario-orange: #E36C33;
            --mario-navy: #060B11; 
            --mario-light: #F1F5F9;
            --mario-border: #E2E8F0;
            --mario-grey: #4A5568;
            --whatsapp-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--mario-light); color: var(--mario-navy); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- WEBSHOP USP TOP BAR --- */
        .top-bar { background: var(--mario-orange); color: white; padding: 8px 5%; display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; z-index: 10000; position: fixed; top: 0; width: 100%; }
        .top-bar-item { display: flex; align-items: center; gap: 8px; }
        .top-bar-item i { font-size: 13px; }

        /* --- HEADER & NAVIGATIE --- */
        header {
            position: fixed; width: 100%; top: 34px; left: 0; z-index: 9998;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; background: rgba(6, 11, 17, 0.95);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo-frame { display: flex; flex-direction: row; align-items: center; gap: 20px; text-decoration: none; }
        .header-logo-img { height: 110px; width: auto; display: block; object-fit: contain; filter: drop-shadow(0 0 8px rgba(227, 108, 51, 0.4)); transform: scale(1.3); transform-origin: left center; transition: 0.3s; }
        .header-logo-img:hover { transform: scale(1.4); }
        
        .logo-text-wrapper { display: flex; flex-direction: column; align-items: flex-start; }
        .mario-logo-text { font-size: 38px; font-weight: 900; color: var(--mario-orange); text-transform: uppercase; letter-spacing: 1px; line-height: 1; text-shadow: 0 0 10px rgba(227, 108, 51, 0.4); }
        .logo-subtext { color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }

        .nav-links { display: flex; gap: 30px; list-style: none; align-items: center; }
        .nav-links a { color: #ffffff; text-decoration: none; font-weight: 600; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-links a i { font-size: 16px; color: var(--mario-orange); }
        .nav-links a:hover { color: var(--mario-orange); transform: translateY(-2px); }

        /* --- SHOP HERO BANNER --- */
        .shop-hero { padding: 160px 5% 60px; background: var(--mario-navy); text-align: center; color: white; position: relative; }
        .shop-hero-bg { position: absolute; inset: 0; background: radial-gradient(circle at top, rgba(227, 108, 51, 0.15) 0%, var(--mario-navy) 100%); z-index: 1; }
        .shop-hero-content { position: relative; z-index: 3; }
        .shop-hero h1 { font-size: clamp(32px, 4vw, 48px); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .shop-hero h1 span { color: var(--mario-orange); }
        .shop-hero p { font-size: 18px; color: #CBD5E1; max-width: 600px; margin: 0 auto; font-weight: 300; }

        /* --- DYNAMISCHE WINKEL CONTAINER --- */
        .shop-container { max-width: 1300px; margin: 60px auto 100px; padding: 0 20px; }
        
        .brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .brand-card { background: white; border-radius: 16px; border: 1px solid var(--mario-border); box-shadow: 0 10px 25px rgba(0,0,0,0.04); overflow: hidden; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
        .brand-card:hover { transform: translateY(-8px); border-color: var(--mario-orange); box-shadow: 0 20px 40px rgba(227, 108, 51, 0.15); }
        .brand-card img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 20px; transition: 0.3s; }
        .brand-card i.cat-icon { font-size: 80px; color: var(--mario-navy); margin-bottom: 20px; transition: 0.3s; }
        .brand-card:hover img, .brand-card:hover i.cat-icon { transform: scale(1.05); color: var(--mario-orange); }
        .brand-card h3 { font-size: 20px; font-weight: 900; color: var(--mario-navy); text-transform: uppercase; }
        .brand-card p { font-size: 14px; color: var(--mario-orange); font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 5px; }

        .products-view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 2px solid var(--mario-border); }
        .products-view-header h2 { font-size: 28px; font-weight: 900; color: var(--mario-navy); text-transform: uppercase; }
        .btn-back { background: var(--mario-navy); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: var(--mario-orange); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 16px; border: 1px solid var(--mario-border); box-shadow: 0 10px 25px rgba(0,0,0,0.04); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--mario-orange); box-shadow: 0 20px 40px rgba(227, 108, 51, 0.12); }
        
        .product-img-box { width: 100%; height: 200px; background: #ffffff; padding: 20px; border-bottom: 1px solid var(--mario-light); display: flex; align-items: center; justify-content: center; }
        .product-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05)); transition: 0.3s; }
        .product-card:hover .product-img-box img { transform: scale(1.05); }

        .product-info { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-brand-tag { font-size: 11px; color: white; background: var(--mario-grey); padding: 4px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; align-self: flex-start; margin-bottom: 15px; }
        .product-title { font-size: 18px; font-weight: 800; color: var(--mario-navy); margin-bottom: 10px; line-height: 1.3; }

        .product-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px solid var(--mario-light); padding-top: 15px; }
        
        .price-box { display: flex; flex-direction: column; }
        .product-price { font-size: 22px; font-weight: 900; color: var(--mario-navy); line-height: 1; }
        .old-price { font-size: 13px; color: #94a3b8; text-decoration: line-through; margin-top: 2px; font-weight: 600; }
        
        .btn-whatsapp { background: var(--whatsapp-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-whatsapp:hover { background: #1da851; transform: scale(1.05); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }

        .btn-buy { background: var(--mario-navy); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-buy:hover { background: var(--mario-orange); transform: scale(1.05); box-shadow: 0 5px 15px rgba(227, 108, 51, 0.4); }

        /* --- FOOTER --- */
        footer { background-color: var(--mario-navy); color: white; padding: 60px 5% 0; }
        .footer-grid { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding-bottom: 40px; }
        .footer-col h4 { color: var(--mario-orange); font-size: 18px; text-transform: uppercase; margin-bottom: 20px; font-weight: 900; }
        .footer-col p { color: #CBD5E1; font-size: 15px; line-height: 1.8; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .payment-icons { display: flex; gap: 15px; margin-top: 15px; font-size: 35px; color: white; align-items: center; }
        .payment-icons i { transition: 0.3s; cursor: pointer; }
        .payment-icons i:hover { color: var(--mario-orange); }
        .bancontact-text { font-size: 13px; font-weight: 900; background: white; color: #004B87; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; line-height: 1; margin-top: 4px; }
        .footer-col .big-hours { font-size: 22px; font-weight: 800; color: white; margin-top: 15px; }
        .developer-credit-frame { background: #000000; padding: 25px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .developer-credit-frame p { font-size: 13px; color: #A0AEC0; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin: 0; }
        .developer-credit-frame strong { color: var(--mario-orange); font-weight: 900; }

        .ai-chat-btn:hover { transform: translateY(-5px); background: #111; }
        .ai-chat-btn img { height: 24px; object-fit: contain; filter: drop-shadow(0 0 3px rgba(255,255,255,0.5)); animation: pulse 2s infinite; }
        
        .chat-window { position: fixed; bottom: 90px; right: 30px; width: 380px; background: white; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--mario-border); z-index: 10000; display: none; flex-direction: column; overflow: hidden; transform: translateY(20px); opacity: 0; transition: all 0.3s; }
        .chat-window.active { display: flex; transform: translateY(0); opacity: 1; }
        .chat-header { background: var(--mario-navy); color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid var(--mario-orange); }
        .chat-header img { height: 35px; filter: drop-shadow(0 0 5px rgba(227, 108, 51, 0.5)); }
        .chat-header-text { display: flex; flex-direction: column; flex-grow: 1; }

        .chat-header-text small { font-size: 10px; color: #CBD5E1; text-transform: uppercase; letter-spacing: 1px; }
        .close-chat { color: white; background: none; border: none; font-size: 24px; cursor: pointer; margin-left: auto; line-height: 1; }
        .expert-selector { display: flex; background: #F1F5F9; padding: 10px; gap: 8px; border-bottom: 1px solid var(--mario-border); }
        .expert-btn { flex: 1; padding: 10px 5px; border-radius: 8px; border: 1px solid transparent; background: transparent; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--mario-grey); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .expert-btn i { font-size: 18px; }
        .expert-btn:hover { background: rgba(227, 108, 51, 0.1); color: var(--mario-orange); }
        .expert-btn.active { background: var(--mario-orange); color: white; border-color: var(--mario-orange); box-shadow: 0 4px 10px rgba(227, 108, 51, 0.3); }
        .chat-body { padding: 20px; height: 320px; overflow-y: auto; background: white; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
