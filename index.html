    <style>
        :root {
            --mario-orange: #E36C33;
            --mario-navy: #060B11; /* Nog dieper, luxer zwart-blauw */
            --card-glass: rgba(255, 255, 255, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body { 
            background-color: #F1F5F9; 
            color: var(--mario-navy); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- PREMIUM ANIMATIES --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-up { animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale { animation: scaleIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        /* --- CLEAN HEADER (GEEN LOGO MEER HIER) --- */
        header {
            position: fixed; width: 100%; top: 0; left: 0; z-index: 9999;
            display: flex; justify-content: flex-end; /* Zet het menu netjes rechts */
            padding: 20px 5%;
            background: rgba(6, 11, 17, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            color: #ffffff; text-decoration: none; font-weight: 500; font-size: 14px;
            letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--mario-orange); }

        .hamburger { display: none; color: white; font-size: 32px; cursor: pointer; }

        /* --- GIGANTISCHE HERO MET LOGO IN HET MIDDEN --- */
        .hero {
            position: relative; height: 100vh; min-height: 750px;
            display: flex; align-items: center; justify-content: center;
            background-color: var(--mario-navy);
            overflow: hidden;
        }

        /* Subtiele luxe achtergrond straling */
        .hero-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(30, 60, 90, 0.4) 0%, var(--mario-navy) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative; z-index: 3; text-align: center; color: white;
            max-width: 1000px; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HET GIGANTISCHE LOGO */
        .hero-center-logo {
            width: 100%;
            max-width: 450px; /* Groot en massief */
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            border-radius: 8px; /* Maakt de randjes iets zachter */
        }

            line-height: 1.6;
        }
