<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Doe-Het-Zelf & Renovatie | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mario-orange: #E36C33; --mario-blue: #1C3B5E; --white: #ffffff; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--mario-blue); }
        
        /* HEADER AHTANS STIJL */
        header { background: var(--white); border-bottom: 2px solid var(--mario-blue); padding: 10px 20px; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 50px; }
        nav a { text-decoration: none; color: var(--mario-blue); font-weight: 700; margin-left: 20px; font-size: 14px; text-transform: uppercase; }
        nav a:hover { color: var(--mario-orange); }

        /* HERO SECTION */
        .hero { padding: 100px 20px; text-align: center; background: linear-gradient(rgba(28,59,94,0.05), rgba(28,59,94,0.05)); }
        .hero h1 { font-size: 38px; margin-bottom: 10px; }
        .hero h1 span { color: var(--mario-orange); }
        .hero p { max-width: 700px; margin: 0 auto 30px; font-size: 18px; color: #555; }
        
        .btn { background: var(--mario-orange); color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: 700; display: inline-block; transition: 0.3s; }
        .btn:hover { background: var(--mario-blue); }

        footer { background: var(--mario-blue); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        @media (max-width: 768px) { nav { display: none; } } /* Simpel voor nu op mobiel */
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <img src="1765121277157.jpg" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="winkel.html">Winkel</a>
            <a href="renovatie.html">Renovatie</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Welkom bij <span>Mario</span></h1>
    <p>Uw gediplomeerde partner voor doe-het-zelf en totaalrenovaties in Berchem. Bij ons voelt u zich thuis: service en advies met een glimlach.</p>
    <a href="contact.html" class="btn">Maak een afspraak</a>
</section>

<footer>
    <p>Driekoningenstraat 73, 2600 Berchem | 7/7 Open vanaf 08:30</p>
</footer>

</body>
</html>
