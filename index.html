:root{

}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 5%;
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:24px;
font-weight:800;
}

.logo span{
color:var(--orange);
}

/* NAV */

nav{
display:flex;
gap:30px;
}

nav a{
text-decoration:none;
color:var(--grey);
font-weight:600;
}

/* HERO */

.hero{
padding:80px 5%;
background:linear-gradient(135deg,#EDF2F7,#ffffff);
display:flex;
justify-content:center;
}

.hero-container{
display:flex;
gap:60px;
max-width:1300px;
align-items:center;
}

.hero-text{
flex:1;
}

.hero-text h1{
font-size:46px;
margin-bottom:20px;

.hero-text h1 span{
color:var(--orange);

.hero-text p{

.btn{

color:white;
padding:15px 28px;
border-radius:8px;
text-decoration:none;
font-weight:700;
}

.hero-image{
flex:1;
position:relative;
}

.hero-image img{
width:100%;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* floating logos */

.float{
position:absolute;
background:white;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
animation:float 6s infinite ease-in-out;
}

.float img{
max-width:80%;
}

.f1{top:-20px;left:-20px}
.f2{bottom:20px;right:-20px}
.f3{top:50%;left:-30px}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}
